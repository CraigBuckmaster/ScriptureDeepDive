<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Parallel Passages — Scripture Deep Dive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Cinzel:wght@400;500;600&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="base.css">
<style>
:root { --accent:#c9a84c; }

.syn-wrapper { max-width:1100px; margin:0 auto; padding:1.5rem; }
.syn-nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:2rem; padding-bottom:1rem; border-bottom:1px solid var(--border); }
.syn-nav a { font-family:'Source Sans 3',sans-serif; font-size:.72rem; color:var(--gold-dim); text-decoration:none; letter-spacing:.06em; transition:color .15s; }
.syn-nav a:hover { color:var(--gold); }
.syn-title { font-family:'Cinzel',serif; font-size:clamp(1.4rem,4vw,2.2rem); color:var(--text); letter-spacing:.04em; margin-bottom:.4rem; }
.syn-subtitle { font-family:'Source Sans 3',sans-serif; font-size:.82rem; color:var(--text-muted); margin-bottom:2rem; }

/* Search + filter */
.syn-controls { display:flex; gap:.8rem; flex-wrap:wrap; margin-bottom:2rem; }
.syn-search { flex:1; min-width:200px; background:rgba(255,255,255,.04); border:1px solid var(--border); border-radius:4px;
  padding:.5rem .8rem; font-family:'Source Sans 3',sans-serif; font-size:.85rem; color:var(--text); outline:none; transition:border-color .15s; }
.syn-search:focus { border-color:var(--gold-dim); }
.syn-search::placeholder { color:var(--text-muted); }
.syn-filter-btn { font-family:'Source Sans 3',sans-serif; font-size:.65rem; letter-spacing:.08em; text-transform:uppercase;
  padding:.4rem .7rem; background:rgba(255,255,255,.03); border:1px solid var(--border); border-radius:3px;
  color:var(--text-muted); cursor:pointer; transition:all .12s; }
.syn-filter-btn:hover { border-color:var(--gold-dim); color:var(--text-dim); }
.syn-filter-btn.active { background:rgba(201,168,76,.1); border-color:var(--gold-dim); color:var(--accent); }

/* Pericope list */
.syn-list { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:.8rem; }
.syn-card { display:flex; flex-direction:column; gap:.4rem; padding:.9rem 1rem; background:rgba(255,255,255,.02);
  border:1px solid var(--border); border-radius:4px; cursor:pointer; transition:background .12s, border-color .12s; text-decoration:none; }
.syn-card:hover { background:rgba(201,168,76,.04); border-color:var(--gold-dim); }
.syn-card-title { font-family:'Cinzel',serif; font-size:.78rem; letter-spacing:.04em; color:var(--text); }
.syn-card-refs { font-family:'Source Sans 3',sans-serif; font-size:.68rem; color:var(--text-muted); }
.syn-card-count { font-family:'Source Sans 3',sans-serif; font-size:.58rem; color:var(--gold-dim); letter-spacing:.05em; }
.syn-empty { font-family:'Source Sans 3',sans-serif; font-size:.82rem; color:var(--text-muted); text-align:center; padding:3rem 0; font-style:italic; }

/* Comparison view */
.syn-compare { display:none; }
.syn-compare.open { display:block; }
.syn-compare-back { font-family:'Source Sans 3',sans-serif; font-size:.72rem; color:var(--gold-dim); cursor:pointer;
  background:none; border:none; margin-bottom:1.5rem; transition:color .15s; padding:0; }
.syn-compare-back:hover { color:var(--gold); }
.syn-compare-title { font-family:'Cinzel',serif; font-size:1.1rem; color:var(--accent); letter-spacing:.04em; margin-bottom:1.2rem; }
.syn-columns { display:grid; gap:1rem; }
.syn-column { background:rgba(255,255,255,.02); border:1px solid var(--border); border-radius:4px; padding:1rem; }
.syn-col-header { font-family:'Cinzel',serif; font-size:.72rem; letter-spacing:.08em; text-transform:uppercase;
  color:var(--accent); margin-bottom:.7rem; padding-bottom:.4rem; border-bottom:1px solid var(--border); }
.syn-col-header a { color:var(--accent); text-decoration:none; border-bottom:1px solid rgba(201,168,76,.3); }
.syn-col-header a:hover { border-color:var(--accent); }
.syn-col-text { font-family:'EB Garamond',Georgia,serif; font-size:.95rem; color:var(--text-dim); line-height:1.8; }
.syn-col-text .v-num { font-family:'Source Sans 3',sans-serif; font-size:.6rem; color:var(--gold-dim); vertical-align:super; margin-right:.15rem; }
.syn-loading { font-family:'Source Sans 3',sans-serif; font-size:.75rem; color:var(--text-muted); font-style:italic; padding:1rem 0; }

/* Responsive: tabs on mobile */
@media (min-width:768px) { .syn-columns { grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); } }
.syn-tabs { display:none; flex-wrap:wrap; gap:.3rem; margin-bottom:1rem; }
@media (max-width:767px) {
  .syn-tabs { display:flex; }
  .syn-columns { grid-template-columns:1fr; }
  .syn-column { display:none; }
  .syn-column.active { display:block; }
}
.syn-tab { font-family:'Source Sans 3',sans-serif; font-size:.62rem; letter-spacing:.06em; text-transform:uppercase;
  padding:.35rem .6rem; background:rgba(255,255,255,.03); border:1px solid var(--border); border-radius:3px;
  color:var(--text-muted); cursor:pointer; transition:all .12s; }
.syn-tab.active { background:rgba(201,168,76,.1); border-color:var(--gold-dim); color:var(--accent); }
</style>
</head>
<body>
<div class="syn-wrapper">
  <nav class="syn-nav">
    <a href="index.html">&larr; Library</a>
  </nav>
  <h1 class="syn-title">Parallel Passages</h1>
  <p class="syn-subtitle">Compare how the same events are told across different biblical books.</p>
  <div id="syn-target"></div>
</div>
<script src="books.js"></script>
<script src="verse-resolver.js"></script>
<script src="data/synoptic-map.js"></script>
<script src="synoptic.js"></script>
<script>
(function() {
  'use strict';

  var SYN = window.Synoptic;
  var VR  = window.VerseResolver;
  if (!SYN || !VR) return;

  var target = document.getElementById('syn-target');
  var allEntries = SYN.allEntries();
  var activeFilter = 'all';

  // ── Category labels ──────────────────────────────────────────────────
  var CAT_LABELS = {
    'gospel': 'Synoptic Gospels',
    'gospel-luke': 'Luke Special',
    'gospel-john': 'John Special',
    'ot-parallel': 'OT Parallels'
  };

  // ── Render list view ─────────────────────────────────────────────────
  function renderList(filter, query) {
    var entries = allEntries;
    if (filter && filter !== 'all') {
      entries = entries.filter(function(e) { return e.category === filter; });
    }
    if (query) {
      var q = query.toLowerCase();
      entries = entries.filter(function(e) {
        return e.title.toLowerCase().indexOf(q) > -1 ||
               e.passages.some(function(p) { return p.ref.toLowerCase().indexOf(q) > -1; });
      });
    }

    var cats = SYN.allCategories();
    var filtersHtml = '<div class="syn-controls">' +
      '<input class="syn-search" id="syn-search" placeholder="Search passages\u2026" value="' + (query || '') + '">' +
      '<button class="syn-filter-btn' + (activeFilter === 'all' ? ' active' : '') + '" data-cat="all">All</button>';
    cats.forEach(function(c) {
      filtersHtml += '<button class="syn-filter-btn' + (activeFilter === c ? ' active' : '') +
        '" data-cat="' + c + '">' + (CAT_LABELS[c] || c) + '</button>';
    });
    filtersHtml += '</div>';

    var listHtml = '';
    if (entries.length === 0) {
      listHtml = '<p class="syn-empty">No parallel passages found.</p>';
    } else {
      listHtml = '<div class="syn-list">';
      entries.forEach(function(e) {
        var refs = e.passages.map(function(p) { return VR.toShort(p.ref) || p.ref; }).join(' \u00b7 ');
        var count = e.passages.length + ' passage' + (e.passages.length !== 1 ? 's' : '');
        listHtml += '<a class="syn-card" data-id="' + e.id + '">' +
          '<span class="syn-card-title">' + e.title + '</span>' +
          '<span class="syn-card-refs">' + refs + '</span>' +
          '<span class="syn-card-count">' + count + ' \u00b7 ' + (CAT_LABELS[e.category] || e.category) + '</span>' +
          '</a>';
      });
      listHtml += '</div>';
    }

    target.innerHTML = filtersHtml + listHtml;

    // Event listeners
    document.getElementById('syn-search').addEventListener('input', function(e) {
      renderList(activeFilter, e.target.value);
    });
    target.querySelectorAll('.syn-filter-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        activeFilter = btn.getAttribute('data-cat');
        renderList(activeFilter, document.getElementById('syn-search').value);
      });
    });
    target.querySelectorAll('.syn-card').forEach(function(card) {
      card.addEventListener('click', function(e) {
        e.preventDefault();
        renderCompare(card.getAttribute('data-id'));
      });
    });
  }

  // ── Render comparison view ───────────────────────────────────────────
  function renderCompare(entryId) {
    var entry = SYN.getEntry(entryId);
    if (!entry) return;

    // Tabs for mobile
    var tabsHtml = '<div class="syn-tabs">';
    entry.passages.forEach(function(p, i) {
      var parsed = VR.parse(p.ref);
      var label = parsed ? parsed.name : p.book;
      tabsHtml += '<button class="syn-tab' + (i === 0 ? ' active' : '') + '" data-idx="' + i + '">' + label + '</button>';
    });
    tabsHtml += '</div>';

    // Columns
    var colsHtml = '<div class="syn-columns">';
    entry.passages.forEach(function(p, i) {
      var parsed = VR.parse(p.ref);
      var headerText = p.ref;
      if (parsed && VR.isLive(parsed.book, parsed.ch)) {
        headerText = '<a href="' + parsed.url + '">' + p.ref + '</a>';
      }
      colsHtml += '<div class="syn-column' + (i === 0 ? ' active' : '') + '" data-idx="' + i + '">' +
        '<div class="syn-col-header">' + headerText + '</div>' +
        '<div class="syn-col-text" id="syn-text-' + i + '"><span class="syn-loading">Loading\u2026</span></div>' +
        '</div>';
    });
    colsHtml += '</div>';

    target.innerHTML =
      '<button class="syn-compare-back">&larr; Back to all passages</button>' +
      '<div class="syn-compare-title">' + entry.title + '</div>' +
      tabsHtml + colsHtml;

    // Back button
    target.querySelector('.syn-compare-back').addEventListener('click', function() {
      renderList(activeFilter);
    });

    // Tab switching (mobile)
    target.querySelectorAll('.syn-tab').forEach(function(tab) {
      tab.addEventListener('click', function() {
        var idx = tab.getAttribute('data-idx');
        target.querySelectorAll('.syn-tab').forEach(function(t) { t.classList.remove('active'); });
        target.querySelectorAll('.syn-column').forEach(function(c) { c.classList.remove('active'); });
        tab.classList.add('active');
        var col = target.querySelector('.syn-column[data-idx="' + idx + '"]');
        if (col) col.classList.add('active');
      });
    });

    // Load verse text from VERSES data
    entry.passages.forEach(function(p, i) {
      loadVerseText(p, i);
    });
  }

  // ── Load verse text from VERSES_ALL or per-book verse files ──────────
  function loadVerseText(passage, colIndex) {
    var parsed = VR.parse(passage.ref);
    if (!parsed) {
      document.getElementById('syn-text-' + colIndex).innerHTML = '<em>Reference not found</em>';
      return;
    }

    var allVerses = window.VERSES_ALL || [];

    // Filter verses for this passage
    var matches = allVerses.filter(function(v) {
      return v.book === parsed.name && v.ch === parsed.ch &&
        (!parsed.v1 || (v.v >= parsed.v1 && v.v <= (parsed.v2 || parsed.v1)));
    });

    if (matches.length > 0) {
      renderVerses(matches, colIndex);
      return;
    }

    // Try loading the per-book verse file dynamically
    var bookVar = 'VERSES_' + parsed.book.toUpperCase().replace(/ /g, '_');
    if (window[bookVar]) {
      matches = window[bookVar].filter(function(v) {
        return v.ch === parsed.ch &&
          (!parsed.v1 || (v.v >= parsed.v1 && v.v <= (parsed.v2 || parsed.v1)));
      });
      renderVerses(matches, colIndex);
    } else {
      // Load verse file
      var testament = parsed.testament;
      var dir = parsed.book;
      var src = 'verses/niv/' + testament + '/' + dir + '.js';
      var s = document.createElement('script');
      s.src = src;
      s.onload = function() {
        if (window[bookVar]) {
          var m = window[bookVar].filter(function(v) {
            return v.ch === parsed.ch &&
              (!parsed.v1 || (v.v >= parsed.v1 && v.v <= (parsed.v2 || parsed.v1)));
          });
          renderVerses(m, colIndex);
        }
      };
      s.onerror = function() {
        document.getElementById('syn-text-' + colIndex).innerHTML = '<em>Verse text not available</em>';
      };
      document.head.appendChild(s);
    }
  }

  function renderVerses(verses, colIndex) {
    var el = document.getElementById('syn-text-' + colIndex);
    if (!el) return;
    if (verses.length === 0) {
      el.innerHTML = '<em>No verses found for this range</em>';
      return;
    }
    var html = '';
    verses.forEach(function(v) {
      html += '<span class="v-num">' + v.v + '</span>' + v.text + ' ';
    });
    el.innerHTML = html;
  }

  // ── Handle hash for direct linking ───────────────────────────────────
  function handleHash() {
    var hash = location.hash.replace('#', '');
    if (hash) {
      var entry = SYN.getEntry(hash);
      if (entry) {
        renderCompare(hash);
        return;
      }
    }
    renderList('all');
  }

  handleHash();
  window.addEventListener('hashchange', handleHash);
})();
</script>
<script src="site-footer.js"></script>
</body>
</html>
