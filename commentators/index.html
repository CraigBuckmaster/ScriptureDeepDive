<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Commentators &mdash; Scripture Walkthrough</title>
<link rel="manifest" href="../manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Scripture">
<meta name="theme-color" content="#0c0a07">
<link rel="apple-touch-icon" href="../icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Cinzel:wght@400;500;600&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../base.css">
<style>

body {
  background:var(--bg);
  color:var(--text);
  font-family:'EB Garamond',Georgia,serif;
  font-size:17px;
  line-height:1.75;
  min-height:100vh;
}
.hub-nav {
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:.7rem 1.5rem;
  background:var(--bg2);
  border-bottom:1px solid var(--border);
}
.hub-nav a {
  font-family: 'Cinzel', serif;
  font-size: .6rem;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--text-dim);
  text-decoration: none;
  transition: color .15s;
}
.hub-nav a:hover { color: var(--gold); }
.hub-nav-title {
  font-family:'Cinzel',serif;
  font-size:.75rem;
  letter-spacing:.2em;
  text-transform:uppercase;
  color:var(--text-muted);
}
.hub-nav-links { display:flex; gap:.4rem; }
.hub-nav-links a {
  font-family:'Cinzel',serif;
  font-size:.58rem;
  letter-spacing:.14em;
  text-transform:uppercase;
  color:var(--text-dim);
  text-decoration:none;
  padding:.28rem .6rem;
  border:1px solid transparent;
  border-radius:3px;
  white-space:nowrap;
  transition:color .15s, border-color .15s;
}
.hub-nav-links a:hover { color:var(--gold); border-color:var(--border); }
.hub-wrap {
  max-width:900px;
  margin:0 auto;
  padding:4rem 1.5rem 6rem;
}
.hub-heading {
  font-family:'Cinzel',serif;
  font-size:.68rem;
  letter-spacing:.3em;
  text-transform:uppercase;
  color:var(--gold-dim);
  text-align:center;
  margin-bottom:.8rem;
}
.hub-sub {
  font-family:'Source Sans 3',sans-serif;
  font-size:.85rem;
  color:var(--text-muted);
  text-align:center;
  max-width:560px;
  margin:0 auto 3rem;
  line-height:1.65;
}
.hub-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:1.2rem;
}
.hub-card {
  display:block;
  background:var(--bg3);
  border:1px solid var(--border2);
  border-left:3px solid var(--accent);
  border-radius:0 5px 5px 0;
  padding:1.4rem 1.3rem;
  text-decoration:none;
  transition:border-color .15s, background .15s;
}
.hub-card:hover {
  background:var(--bg2);
  border-color:var(--accent);
}
.hub-card-name {
  font-family:'Cinzel',serif;
  font-size:.75rem;
  letter-spacing:.15em;
  text-transform:uppercase;
  color:var(--accent);
  display:block;
  margin-bottom:.3rem;
}
.hub-card-tradition {
  font-family:'Source Sans 3',sans-serif;
  font-size:.68rem;
  color:var(--text-muted);
  letter-spacing:.04em;
  display:block;
  margin-bottom:.7rem;
}
.hub-card-desc {
  font-family:'EB Garamond',serif;
  font-size:.95rem;
  color:var(--text-dim);
  line-height:1.6;
}
footer {
  padding:1.5rem;
  text-align:center;
  font-family:'Source Sans 3',sans-serif;
  font-size:.72rem;
  color:var(--text-muted);
  border-top:1px solid var(--border2);
  line-height:1.7;
}
</style>
</head>
<body>
<nav class="hub-nav">
  <a href="../index.html">&#8592; Library</a>
  <span class="hub-nav-title">Scholars &amp; Commentators</span>
  <span class="hub-nav-links">
    <a href="../people.html">People</a>
    <a href="../map.html">Map</a>
    <a href="../timeline.html">Timeline</a>
  </span>
</nav>
<div class="hub-wrap">
  <p class="hub-heading">Scholars &amp; Commentators</p>
  <p class="hub-sub">Four voices appear throughout Scripture Walkthrough &mdash; each bringing a distinct tradition, method, and set of questions to the same text.</p>
  <div class="hub-grid" id="hub-grid-target"></div>
</div>
<script src="scholar-data.js"></script>
<script>
(function() {
  var SCHOLARS = window.SCHOLAR_DATA || [];
  var target = document.getElementById('hub-grid-target');
  if (!target || !SCHOLARS.length) return;
  var html = '';
  for (var i = 0; i < SCHOLARS.length; i++) {
    var s = SCHOLARS[i];
    html += '<a href="' + s.key + '.html" class="hub-card" style="--accent:' + s.color + '">' +
      '<span class="hub-card-name">' + s.name + '</span>' +
      '<span class="hub-card-tradition">' + s.tradition + '</span>' +
      '<span class="hub-card-desc">' + s.desc + '</span></a>';
  }
  target.innerHTML = html;
})();
</script>
<script src="../site-footer.js"></script>
</body>
</html>
