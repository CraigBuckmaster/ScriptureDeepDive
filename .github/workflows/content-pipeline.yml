name: Content Pipeline

on:
  pull_request:
    branches: [master]
    paths:
      - 'content/**'
      - '_tools/**'
  push:
    branches: [master]
    paths:
      - 'content/**'
      - '_tools/**'
  workflow_dispatch:  # Allow manual triggering for R2 re-uploads

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  validate-and-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false
          fetch-depth: 0  # Full history for diff

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install anthropic

      - name: Remove pre-built DB (build from scratch)
        run: rm -f scripture.db

      # ── Stage 1: Schema + DB (blocking) ──────────────────────

      - name: Validate content JSON
        id: validate_json
        run: |
          python3 _tools/schema_validator.py 2>&1 | tee validate_json.log

      - name: Build scripture.db
        id: build_db
        run: |
          python3 _tools/build_sqlite.py 2>&1 | tee build_db.log

      - name: Validate scripture.db integrity
        id: validate_db
        run: |
          python3 _tools/validate_sqlite.py 2>&1 | tee validate_db.log

      # ── Upload to R2 (master only) ───────────────────────────

      - name: Upload to CloudFlare R2
        if: github.ref == 'refs/heads/master' && github.event_name != 'pull_request'
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
        run: |
          pip install boto3
          python3 _tools/upload_to_r2.py

      # ── Commit rebuilt assets back to repo ───────────────────

      - name: Commit rebuilt DB and manifest
        if: github.ref == 'refs/heads/master' && github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/assets/scripture.db app/assets/db-manifest.json scripture.db
          if git diff --cached --quiet; then
            echo "No asset changes to commit"
          else
            git commit -m "Rebuild scripture.db [content-pipeline]"
            git push
          fi

      # ── Stage 2: Detect changed chapters ─────────────────────

      - name: Detect changed content
        id: changes
        if: github.event_name == 'pull_request'
        run: |
          # Detect all changed content files, excluding code-only changes
          ALL_CHANGED=$(git diff --name-only ${{ github.event.pull_request.base.sha }} HEAD 2>/dev/null)

          # Filter to content files only (skip code: .ts .tsx .js .jsx .py .sh .yml .yaml .lock)
          CHANGED=$(echo "$ALL_CHANGED" | grep -E '^content/' | sort)

          if [ -z "$CHANGED" ]; then
            echo "has_content_changes=false" >> $GITHUB_OUTPUT
            echo "No content file changes detected (code-only PR)"
          else
            COUNT=$(echo "$CHANGED" | wc -l)
            echo "has_content_changes=true" >> $GITHUB_OUTPUT
            echo "changed_files<<ENDFILES" >> $GITHUB_OUTPUT
            echo "$CHANGED" >> $GITHUB_OUTPUT
            echo "ENDFILES" >> $GITHUB_OUTPUT
            echo "change_count=$COUNT" >> $GITHUB_OUTPUT
            echo "Changed content files: $COUNT"
            echo "$CHANGED"
          fi

      # ── Stage 3: Quality + Accuracy checks ───────────────────

      - name: Run content quality + accuracy checks
        id: content_check
        if: >
          github.event_name == 'pull_request' &&
          steps.changes.outputs.has_content_changes == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Tier 2 requires BOTH the tier2 label AND a valid API key
          HAS_LABEL=${{ contains(github.event.pull_request.labels.*.name, 'tier2') }}
          if [ "$HAS_LABEL" = "true" ] && [ -n "$ANTHROPIC_API_KEY" ]; then
            TIER=2
            echo "Tier 2 enabled (tier2 label + API key)"
          else
            TIER=1
            if [ "$HAS_LABEL" != "true" ]; then
              echo "Tier 1 only (add 'tier2' label to enable accuracy checks)"
            else
              echo "Tier 1 only (tier2 label present but no ANTHROPIC_API_KEY secret)"
            fi
          fi

          # Run the orchestrator
          echo "${{ steps.changes.outputs.changed_files }}" | \
            python3 _tools/ci_content_check.py --stdin --tier $TIER > ci_output.json 2>ci_stderr.log

          CI_EXIT=$?
          echo "ci_exit_code=$CI_EXIT" >> $GITHUB_OUTPUT

          # Extract results to files (avoids ARG_MAX limits on large summaries)
          python3 -c "
          import json
          data = json.load(open('ci_output.json'))
          with open('ci_summary.md', 'w') as f:
              f.write(data.get('summary_markdown', ''))
          with open('ci_issues.json', 'w') as f:
              json.dump(data.get('issues_to_create', []), f)
          with open('ci_passing.json', 'w') as f:
              json.dump(data.get('quality_passing', []), f)
          with open('ci_status.txt', 'w') as f:
              f.write(data.get('status', 'pass'))
          "

          echo "status=$(cat ci_status.txt)" >> $GITHUB_OUTPUT

          # Show stderr (progress messages)
          cat ci_stderr.log

          exit $CI_EXIT
        continue-on-error: true

      # ── Stage 4: Generate combined summary ───────────────────

      - name: Generate pipeline summary
        if: always()
        id: summary
        run: |
          JSON_STATUS="${{ steps.validate_json.outcome }}"
          BUILD_STATUS="${{ steps.build_db.outcome }}"
          DB_STATUS="${{ steps.validate_db.outcome }}"
          CONTENT_STATUS="${{ steps.content_check.outputs.status }}"

          # Extract pass/fail counts
          JSON_RESULTS=""
          if [ -f validate_json.log ]; then
            JSON_RESULTS=$(grep -oP 'RESULTS: \K\d+ passed, \d+ failed' validate_json.log || echo "unknown")
          fi

          DB_RESULTS=""
          if [ -f validate_db.log ]; then
            DB_RESULTS=$(grep -oP 'RESULTS: \K\d+ passed, \d+ failed' validate_db.log || echo "unknown")
          fi

          status_icon() {
            if [ "$1" = "success" ]; then echo "✅"; else echo "❌"; fi
          }

          # Overall status
          OVERALL="✅ All pipeline checks passed"
          if [ "$JSON_STATUS" != "success" ] || [ "$BUILD_STATUS" != "success" ] || [ "$DB_STATUS" != "success" ]; then
            OVERALL="❌ Pipeline has failures"
          elif [ "$CONTENT_STATUS" = "fail" ]; then
            OVERALL="❌ Content check found hard errors"
          elif [ "$CONTENT_STATUS" = "warn" ]; then
            OVERALL="⚠️ Content check found warnings"
          fi

          # Build the body
          BODY="## Content Pipeline Results

          ${OVERALL}

          | Step | Status | Details |
          |---|---|---|
          | **Schema Validation** | $(status_icon $JSON_STATUS) | ${JSON_RESULTS:-—} |
          | **Build DB** | $(status_icon $BUILD_STATUS) | — |
          | **DB Integrity** | $(status_icon $DB_STATUS) | ${DB_RESULTS:-—} |"

          # Write body to file, then append content summary safely
          echo "$BODY" > pipeline_body.md

          if [ -f ci_summary.md ] && [ -s ci_summary.md ]; then
            echo "" >> pipeline_body.md
            echo "---" >> pipeline_body.md
            echo "" >> pipeline_body.md
            cat ci_summary.md >> pipeline_body.md
          fi

          cat pipeline_body.md >> $GITHUB_STEP_SUMMARY

      # ── Stage 5: Post PR comment ─────────────────────────────

      - name: Post results to PR
        if: always() && github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          retries: 3
          retry-exempt-status-codes: 400,401,404,422
          script: |
            const fs = require('fs');
            let body = '';
            try { body = fs.readFileSync('pipeline_body.md', 'utf8'); } catch { return; }
            if (!body) return;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('## Content Pipeline Results')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      # ── Stage 6: Create issues for warnings ─────────────────

      - name: Create issues for content warnings
        continue-on-error: true
        if: >
          always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          retries: 3
          retry-exempt-status-codes: 400,401,404,422
          script: |
            const fs = require('fs');
            let issuesJson = '[]';
            try { issuesJson = fs.readFileSync('ci_issues.json', 'utf8'); } catch { return; }
            if (!issuesJson || issuesJson === '[]') return;

            let issues;
            try {
              issues = JSON.parse(issuesJson);
            } catch (e) {
              console.log('Failed to parse issues JSON:', e);
              return;
            }

            // Fetch all open content+bug issues once (paginate to avoid missing any)
            const existing = [];
            let page = 1;
            while (true) {
              const { data: batch } = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                labels: 'content,bug',
                per_page: 100,
                page,
              });
              existing.push(...batch);
              if (batch.length < 100) break;
              page++;
            }

            // Helper: extract the chapter prefix from a title for dedup matching.
            // "[Content Quality] Mark 2 below 90 (78)" → "[Content Quality] Mark 2 below 90"
            // "[Content Accuracy] genesis/3 — 1 refuted" → "[Content Accuracy] genesis/3"
            function titlePrefix(title) {
              const qualityMatch = title.match(/^(\[Content Quality\]\s+.+?\s+below\s+\d+)/);
              if (qualityMatch) return qualityMatch[1];
              const accuracyMatch = title.match(/^(\[Content Accuracy\]\s+\S+)/);
              if (accuracyMatch) return accuracyMatch[1];
              return title;
            }

            for (const issue of issues) {
              const prefix = titlePrefix(issue.title);
              const duplicate = existing.find(e => titlePrefix(e.title) === prefix);

              if (duplicate) {
                // Update title and body if the score has changed
                if (duplicate.title !== issue.title || duplicate.body !== issue.body) {
                  await github.rest.issues.update({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: duplicate.number,
                    title: issue.title,
                    body: issue.body,
                  });
                  console.log(`Updated issue #${duplicate.number}: ${issue.title}`);
                } else {
                  console.log(`No changes for #${duplicate.number}: ${issue.title}`);
                }
                continue;
              }

              const { data: created } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: issue.title,
                body: issue.body,
                labels: issue.labels,
              });
              console.log(`Created issue: ${issue.title} (#${created.number})`);
            }

      - name: Auto-close resolved quality issues
        continue-on-error: true
        if: >
          always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          retries: 3
          retry-exempt-status-codes: 400,401,404,422
          script: |
            const fs = require('fs');
            let passingJson = '[]';
            try { passingJson = fs.readFileSync('ci_passing.json', 'utf8'); } catch { return; }

            let passing;
            try {
              passing = JSON.parse(passingJson);
            } catch (e) {
              console.log('Failed to parse passing JSON:', e);
              return;
            }
            if (!passing.length) return;

            // Fetch all open content+bug issues
            const existing = [];
            let page = 1;
            while (true) {
              const { data: batch } = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                labels: 'content,bug',
                per_page: 100,
                page,
              });
              existing.push(...batch);
              if (batch.length < 100) break;
              page++;
            }

            // Build prefixes for passing chapters
            // e.g. book="mark", chapter=2 → "[Content Quality] Mark 2 below"
            for (const ch of passing) {
              const name = ch.book.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
              const prefix = `[Content Quality] ${name} ${ch.chapter} below`;
              const match = existing.find(e => e.title.startsWith(prefix));
              if (match) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: match.number,
                  body: `## Resolved\n\nChapter now scores **${ch.score}** (≥90). Closing automatically.\n\n---\n*Auto-closed by Content Pipeline CI*`,
                });
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: match.number,
                  state: 'closed',
                  state_reason: 'completed',
                });
                console.log(`Closed resolved issue #${match.number}: ${match.title} (now ${ch.score})`);
              }
            }

      # ── Stage 7: Final gate ──────────────────────────────────

      - name: Check for blocking failures
        if: always()
        run: |
          FAILED=false

          if [ "${{ steps.validate_json.outcome }}" != "success" ]; then
            echo "❌ Schema validation failed"
            FAILED=true
          fi

          if [ "${{ steps.build_db.outcome }}" != "success" ]; then
            echo "❌ DB build failed"
            FAILED=true
          fi

          if [ "${{ steps.validate_db.outcome }}" != "success" ]; then
            echo "❌ DB integrity check failed"
            FAILED=true
          fi

          # Content check hard errors block the PR
          if [ "${{ steps.content_check.outputs.status }}" = "fail" ]; then
            echo "❌ Content check found hard errors (REFUTED claims)"
            FAILED=true
          fi

          # Content check warnings do NOT block (issues created instead)
          if [ "${{ steps.content_check.outputs.status }}" = "warn" ]; then
            echo "⚠️ Content check found warnings (issues created)"
          fi

          if [ "$FAILED" = "true" ]; then
            echo "One or more blocking checks failed"
            exit 1
          fi
